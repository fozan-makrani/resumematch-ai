<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResumeMatch</title>
    <script>
      // Runs before React, before first paint. Without this, the page
      // would render in default (light) theme for a moment, then flicker
      // to dark once React's ThemeProvider mounts and reads localStorage.
      (function () {
        const saved = localStorage.getItem("resumematch-theme");
        const theme = saved || "dark"; // dark is our product default
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
